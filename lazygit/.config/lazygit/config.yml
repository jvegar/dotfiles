customCommands:
  - key: "<c-v>"
    description: "AI-powered conventional commit"
    context: "global"
    prompts:
      - type: "menu"
        key: "Type"
        title: "Type of change"
        options:
          - name: "AI defined"
            description: "Let AI analyze and determine the best commit type"
            value: "ai-defined"
          - name: "build"
            description: "Changes that affect the build system or external dependencies"
            value: "build"
          - name: "feat"
            description: "A new feature"
            value: "feat"
          - name: "fix"
            description: "A bug fix"
            value: "fix"
          - name: "chore"
            description: "Other changes that don't modify src or test files"
            value: "chore"
          - name: "ci"
            description: "Changes to CI configuration files and scripts"
            value: "ci"
          - name: "docs"
            description: "Documentation only changes"
            value: "docs"
          - name: "perf"
            description: "A code change that improves performance"
            value: "perf"
          - name: "refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "revert"
            description: "Reverts a previous commit"
            value: "revert"
          - name: "style"
            description: "Changes that do not affect the meaning of the code"
            value: "style"
          - name: "test"
            description: "Adding missing tests or correcting existing tests"
            value: "test"
    command: |
      bash -c '
      diff=$(git diff --cached)
      if [ -z "$diff" ]; then
        echo "No staged changes" >&2
        exit 1
      fi
      SELECTED_TYPE="{{.Form.Type}}"
      prompt="You are an expert at writing Git commits following the Conventional Commits format.

      The user selected type: $SELECTED_TYPE
      (If the user selected \"ai-defined\", analyze the diff and choose the most appropriate type yourself.)

      Available types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert.

      Output a SINGLE commit message with this structure:

      <type>(<scope>): <description>

      [optional blank line followed by body explaining what and why]

      Guidelines:
      - Use the selected type (or pick one if ai-defined)
      - Add scope in parentheses if applicable
      - Use ! after type/scope for breaking changes
      - Lowercase the subject, no period at end
      - Imperative mood (\"add\" not \"added\")
      - Subject under 50 chars

      Previous commits for context:
      $(git log --oneline -10)

      Changes to analyze:
      $(git diff --cached --stat)
      $(git diff --cached)
      "
      echo "$prompt" > /tmp/lazygit-ai-prompt
      msg=$(aichat < /tmp/lazygit-ai-prompt 2>/dev/null)
      if [ -z "$msg" ]; then
        echo "AI generation failed" >&2
        exit 1
      fi
      echo "$msg" > /tmp/ai-commit-msg
      printf "\n\n--- AI generated message ---\n%s\n------------------------------\n" "$msg"
      exec git commit -e -F /tmp/ai-commit-msg
      CODE=$?
      exit $CODE
      '
    loadingText: "Generating commit message..."
    output: terminal
