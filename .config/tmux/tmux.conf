# Terminal settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix key configuration
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Pane splitting
unbind %
bind | split-window -h 
unbind '"'
bind - split-window -v

# Configuration reload
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Pane resizing
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

# Maximize/Restore pane
bind -r m resize-pane -Z

# Mouse support
set -g mouse on

# Vi mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# Remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmuxifier' # create, edit, manage and load complex Tmux sessions

# set tmux tmux-gruvbox theme
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark' # or 'dark256', 'light', 'light256'
set -g @tmux-gruvbox-statusbar-alpha 'true'
# Faster vim detection for vim-tmux-navigator
is_vim="\
echo '#{pane_current_command}' | grep -iqE '^@vim_navigator_pattern$' && exit 0
echo '#{pane_current_command}' | grep -iqE '^(bash|zsh|fish|sh|dash|ksh|csh|tcsh)$' && exit 1
ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +@vim_navigator_pattern$'"
set -g @vim_navigator_check "${is_vim}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

